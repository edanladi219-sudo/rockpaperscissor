<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rock.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Rock Paper Scissors</h1>
            <p class="subtitle">First to 5 wins? Or just keep playing.</p>
        </header>

        <div class="score-board">
            <div class="score">
                <span class="score-label">Player</span>
                <span id="player-score" class="score-number">0</span>
            </div>
            <div class="divider"></div>
            <div class="score">
                <span class="score-label">Computer</span>
                <span id="computer-score" class="score-number">0</span>
            </div>
        </div>

        <div class="game-area">
            <div class="options-container">
                <button id="rock" class="btn">Rock</button>
                <button id="paper" class="btn">Paper</button>
                <button id="scissors" class="btn">Scissors</button>
            </div>
            <div class="results-container">
                <p id="results-msg">Make your choice!</p>
            </div>
        </div>
    </div>
    <script src="rock.js"></script>
</body>
</html>
